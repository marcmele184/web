<title>Política de Cookies</title>

<body>

<h1>Política de Cookies</h1>

<h2>Què són les cookies?</h2>
<p>Són fitxers que s’emmagatzemen al navegador.</p>

<h2>Tipus de cookies</h2>
<ul>
<li>Tècniques</li>
<li>Analítiques</li>
</ul>

<h2>Durada</h2>
<p>Les cookies poden ser de sessió o persistents.</p>

<h2>Gestió</h2>
<p>Podeu acceptar o rebutjar cookies des del banner o el navegador.</p>

</body>
